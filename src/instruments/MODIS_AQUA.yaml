status: operational
availability: public
references:
  - "https://modis.gsfc.nasa.gov/about/"
  - "https://modis.gsfc.nasa.gov/about/specifications.php"
  - "https://mcst.gsfc.nasa.gov/calibration/information"
  - "https://www.earthdata.nasa.gov/data/instruments/modis"
  - "https://database.eohandbook.com/database/instrumentsummary.aspx?instrumentID=395"

data_links:
