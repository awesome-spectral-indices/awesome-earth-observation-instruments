$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/awesome-spectral-indices/awesome-earth-observation-instruments/main/schema/core/core.yaml
title: Earth Observation Sensor
type: object

required:
  - id
  - name
  - acronym
  - type
  - platform_type
  - platform
  - start_date
  - status
  - references
  - availability
  - operator

properties:

  id:
    type: string
    description: Alphanumerical identifier of the instrument

  name:
    type: string
    description: Full name of the instrument

  acronym:
    type: string
    description: Instrument acronym

  type:
    type: string
    description: Instrument sensing modality category
    enum:
      - multispectral
      - hyperspectral
      - radar
      - rgb
      - lidar
      - other

  platform_type:
    type: string
    description: Platform class carrying the instrument
    enum:
      - satellite
      - airborne
      - uav
      - terrestrial

  platform:
    type: array
    description: Satellite name, UAV model, aircraft, or terrestrial platform
    items:
      type: string

  operator:
    type: array
    description: Organization operating the instrument
    items:
      anyOf:
        - type: string
          enum:
            - Copernicus
            - ESA
            - NASA
            - JAXA
            - NOAA
            - DLR
            - ISRO
        - type: string
          description: Other operator (not yet standardized)

  start_date:
    type: string
    description: Start of operation (YYYY-MM-DD)

  status:
    type: string
    description: Operational lifecycle state of the instrument
    enum:
      - operational
      - retired
      - experimental
      - planned

  availability:
    type: string
    enum:
      - public
      - private
    description: Data accessibility level

  end_date:
    type: string
    description: End of operation (YYYY-MM-DD)

  notes:
    type: string
    description: Free-form additional notes

  references:
    type: array
    description: URLs of references (papers, web pages, etc.)
    items:
      type: string

  data_links:
    type: array
    description: URLs where instrument data products can be accessed
    items:
      type: string 

  extensions:
    type: object
    description: Optional extension blocks with domain-specific properties
    additionalProperties: false
    properties:
      spectral:
        description: Spectral characteristics extension
        $ref: ../extensions/spectral.yaml
      imaging:
        description: Imaging and optical characteristics extension
        $ref: ../extensions/imaging.yaml
      data_access:
        description: Data access metadata extension
        $ref: ../extensions/data-access.yaml

additionalProperties: false
