$schema: https://json-schema.org/draft/2020-12/schema
$id: /extensions/earth-engine
title: Earth Engine Extension
type: object

required:
  - primary

properties:

  primary:
    type: object
    description: Primary Earth Engine dataset metadata for this instrument
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of the primary data
      collection:
        type: string
        description: Earth Engine collection name
  
  raw:
    type: object
    description: Optional Earth Engine metadata for raw (unprocessed) products
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of raw data
      collection:
        type: string
        description: Earth Engine collection name

  boa:
    type: object
    description: Optional Earth Engine metadata for bottom-of-atmosphere (BOA) products
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of BOA data
      collection:
        type: string
        description: Earth Engine collection name

  toa:
    type: object
    description: Optional Earth Engine metadata for top-of-atmosphere (TOA) products
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of TOA data
      collection:
        type: string
        description: Earth Engine collection name

additionalProperties: false
