$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/awesome-spectral-indices/awesome-earth-observation-instruments/main/schema/extensions/planetary-computer.yaml
title: Planetary Computer Extension
type: object

required:
  - stac_endpoint
  - primary

properties:

  stac_endpoint:
    type: string
    description: Planetary Computer STAC API endpoint
    const: "https://planetarycomputer.microsoft.com/api/stac/v1"

  primary:
    type: object
    description: Primary Planetary Computer dataset metadata for this instrument
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of the primary data
      collection:
        type: string
        description: Planetary Computer STAC collection name

  raw:
    type: object
    description: Optional Planetary Computer metadata for raw (unprocessed) products
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of raw data
      collection:
        type: string
        description: Planetary Computer STAC collection name

  boa:
    type: object
    description: Optional Planetary Computer metadata for bottom-of-atmosphere (BOA) products
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of BOA data
      collection:
        type: string
        description: Planetary Computer STAC collection name

  toa:
    type: object
    description: Optional Planetary Computer metadata for top-of-atmosphere (TOA) products
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of TOA data
      collection:
        type: string
        description: Planetary Computer STAC collection name

additionalProperties: false
