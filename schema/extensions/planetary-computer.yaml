$schema: https://json-schema.org/draft/2020-12/schema
$id: /extensions/planetary-computer
title: Planetary Computer Extension
type: object

required:
  - stac_endpoint
  - primary

properties:

  stac_endpoint:
    type: string
    description: Planetary Computer STAC endpoint
    const: "https://planetarycomputer.microsoft.com/api/stac/v1"

  primary:
    type: object
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of the primary data
      collection:
        type: string
        description: Planetary Computer STAC collection name

  raw:
    type: object
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of raw data
      collection:
        type: string
        description: Planetary Computer STAC collection name

  boa:
    type: object
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of BOA data
      collection:
        type: string
        description: Planetary Computer STAC collection name

  toa:
    type: object
    additionalProperties: false
    required:
      - docs
      - collection
    properties:
      docs:
        type: string
        description: Link to the documentation of TOA data
      collection:
        type: string
        description: Planetary Computer STAC collection name

additionalProperties: false
