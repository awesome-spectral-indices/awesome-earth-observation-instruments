$schema: https://json-schema.org/draft/2020-12/schema
$id: /extensions/imaging
title: Imaging Extension
type: object

properties:

  swath_width:
    type: number
    description: Swath width (km)

  across_fov:
    type: number
    description: Across-track Field of View (FOV) (degrees). Relevant for satellite platforms

  along_fov:
    type: number
    description: Along-track Field of View (FOV) (degrees). Relevant for satellite platforms

  across_ifov:
    type: number
    description: Across-track Instantaneous Field of View (IFOV) (microradians). Relevant for satellite platforms

  along_ifov:
    type: number
    description: Along-track Instantaneous Field of View (IFOV) (microradians). Relevant for satellite platforms

  hfov:
    type: number
    description: Horizontal Field of View (HFOV) (degrees). Relevant for UAV or similar platforms

  vfov:
    type: number
    description: Vertical Field of View (VFOV) (degrees). Relevant for UAV or similar platforms

  entrance_pupil:
    type: number
    description: Diameter of the entrance pupil (mm)

  focal_length:
    type: number
    description: Focal length (mm)

  fnumber:
    type: number
    description: F-number

  gsd:
    type: number
    description: Ground Sampling Distance (m). If GSD varies by band, define per-band values in the spectral bands data
