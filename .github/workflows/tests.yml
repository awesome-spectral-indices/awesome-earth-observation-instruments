name: validation

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: tests
        run: |
          python -m pytest tests